<!DOCTYPE html>
<html lang="lv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>KM</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Syne+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --ink:#0a0a0a;--paper:#f5f2ed;--p2:#ede9e2;--p3:#e4dfd6;
  --red:#c8392b;--gold:#b8860b;--green:#2d6a4f;
  --dim:#8a8278;--dim2:#c4bdb4;--brd:#d4cfc8;--brd2:#bfb9b0;
  --sb:250px;--top:46px;
}
html,body{height:100%;background:var(--paper);color:var(--ink);font-family:'Syne',sans-serif;font-size:14px;overflow:hidden}

/* ── TOP BAR ── */
#top{position:fixed;top:0;left:0;right:0;height:var(--top);background:var(--ink);display:flex;align-items:center;padding:0 16px;gap:12px;border-bottom:2px solid var(--red);z-index:200}
.brand{font-family:'Syne Mono',monospace;font-size:12px;color:var(--paper);letter-spacing:4px}
.tsep{width:1px;height:16px;background:#2a2a2a;flex-shrink:0}
#clk{font-family:'Syne Mono',monospace;font-size:10px;color:#555}
.tsp{flex:1}
.pill{font-family:'Syne Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;padding:5px 10px;border:1px solid;background:none;cursor:pointer;transition:all .15s;touch-action:manipulation}
#p-in{border-color:#2a2a2a;color:#555}
#p-in:hover,#p-in:active{border-color:var(--red);color:var(--red)}
#p-ok{border-color:var(--green);color:#4caf82;display:none}
#p-out{border-color:#3a1a1a;color:var(--red);display:none}
#p-out:active{background:var(--red);color:var(--paper)}
#mob-menu{display:none;background:none;border:none;color:var(--paper);font-size:20px;cursor:pointer;padding:4px 6px;line-height:1}

/* ── LAYOUT ── */
#shell{display:flex;padding-top:var(--top);height:100vh}

/* ── SIDEBAR ── */
#left{width:var(--sb);flex-shrink:0;background:var(--p2);border-right:1px solid var(--brd);display:flex;flex-direction:column;overflow:hidden;transition:transform .25s;height:100%}
#sb{flex:1;overflow-y:auto;padding:8px 0;-webkit-overflow-scrolling:touch}
#sb::-webkit-scrollbar{width:0}
.shd{font-family:'Syne Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--dim);padding:12px 14px 4px;display:flex;align-items:center}
.sadd{margin-left:auto;background:none;border:1px solid var(--brd2);color:var(--dim);font-size:11px;cursor:pointer;padding:2px 7px;border-radius:2px;display:none;font-family:'Syne Mono',monospace;transition:all .15s;touch-action:manipulation}
.sadd:hover,.sadd:active{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.sdiv{height:1px;background:var(--brd);margin:6px 14px}
.nr{display:flex;align-items:center;padding:9px 14px 9px 20px;gap:7px;cursor:pointer;border-left:2px solid transparent;transition:background .1s;touch-action:manipulation;min-height:40px}
.nr:hover,.nr:active{background:var(--p3)}
.nr.on{background:var(--p3);border-left-color:var(--red)}
.nr.on .nn{color:var(--ink);font-weight:700}
.nn{font-size:12px;color:var(--dim);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.nr:hover .nn,.nr:active .nn{color:var(--ink)}
.nb{font-family:'Syne Mono',monospace;font-size:9px;color:var(--dim);background:var(--p3);border:1px solid var(--brd);padding:2px 6px;border-radius:20px;flex-shrink:0}
.nb.r{color:var(--red);border-color:var(--red);background:rgba(200,57,43,.06)}
.nx{background:none;border:1px solid var(--brd2);color:var(--dim2);font-size:9px;cursor:pointer;padding:2px 6px;font-family:'Syne Mono',monospace;border-radius:2px;flex-shrink:0;touch-action:manipulation}
.nx:hover,.nx:active{border-color:var(--red);color:var(--red)}
.ne{padding:4px 20px;font-family:'Syne Mono',monospace;font-size:9px;color:var(--dim2)}

/* Inline add forms in sidebar */
.sb-form{background:var(--paper);border-bottom:1px solid var(--brd);padding:10px 12px;display:none}
.sb-form.open{display:block}
.sb-form input{width:100%;background:var(--p2);border:1px solid var(--brd2);color:var(--ink);font-family:'Syne Mono',monospace;font-size:11px;padding:6px 8px;border-radius:2px;outline:none;margin-bottom:5px;-webkit-appearance:none}
.sb-form input:focus{border-color:var(--ink)}
.sb-form input::placeholder{color:var(--dim2)}
.sb-form-btns{display:flex;gap:5px}
.sb-form-btns button{flex:1;font-family:'Syne Mono',monospace;font-size:9px;letter-spacing:1px;text-transform:uppercase;padding:6px;border-radius:2px;border:1px solid;cursor:pointer;background:none;touch-action:manipulation}
.sb-ok{border-color:var(--ink);color:var(--ink)}
.sb-ok:active{background:var(--ink);color:var(--paper)}
.sb-cancel{border-color:var(--brd2);color:var(--dim)}

/* Sidebar overlay for mobile */
#sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:149;top:var(--top)}

/* ── MAIN ── */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
#mhd{padding:16px 20px 12px;border-bottom:1px solid var(--brd);flex-shrink:0;background:var(--paper)}
.psub{font-family:'Syne Mono',monospace;font-size:9px;color:var(--dim);letter-spacing:1px;margin-bottom:3px}
.ptit{font-size:18px;font-weight:800;letter-spacing:-.5px;line-height:1}
#mbody{flex:1;overflow-y:auto;padding:16px 20px;-webkit-overflow-scrolling:touch}
#mbody::-webkit-scrollbar{width:3px}
#mbody::-webkit-scrollbar-thumb{background:var(--brd2)}

/* ── LANDING ── */
.land{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:6px}
.land-big{font-size:80px;font-weight:800;color:var(--p3);line-height:1;letter-spacing:-4px;user-select:none}
.land-sm{font-family:'Syne Mono',monospace;font-size:9px;letter-spacing:3px;color:var(--dim2);text-transform:uppercase}

/* ── BUTTONS ── */
.btn{font-family:'Syne Mono',monospace;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;padding:8px 14px;border-radius:2px;border:1px solid var(--brd2);background:transparent;color:var(--dim);cursor:pointer;transition:all .15s;white-space:nowrap;touch-action:manipulation}
.btn:active{opacity:.7}
.btn.p{border-color:var(--ink);color:var(--ink)}
.btn.p:active{background:var(--ink);color:var(--paper)}
.btn.d{border-color:var(--red);color:var(--red)}
.btn.d:active{background:var(--red);color:var(--paper)}
.btn.g{border-color:var(--gold);color:var(--gold)}
.btn.g:active{background:var(--gold);color:var(--paper)}

/* ── CARDS ── */
.card{border:1px solid var(--brd);border-radius:3px;margin-bottom:10px;overflow:hidden;background:var(--paper)}
.chd{padding:10px 14px;background:var(--p2);border-bottom:1px solid var(--brd);display:flex;align-items:center;gap:8px}
.cht{font-size:10px;font-weight:700;letter-spacing:.5px;flex:1}
.chm{font-family:'Syne Mono',monospace;font-size:9px;color:var(--dim)}

/* ── PERSON ROW ── */
.pr{display:flex;align-items:center;padding:10px 14px;gap:10px;border-bottom:1px solid var(--brd)}
.pr:last-child{border-bottom:none}
.pav{width:32px;height:32px;border-radius:50%;background:var(--p3);border:1px solid var(--brd2);display:flex;align-items:center;justify-content:center;font-family:'Syne Mono',monospace;font-size:9px;font-weight:700;color:var(--dim);flex-shrink:0;text-transform:uppercase}
.pi{flex:1;min-width:0}
.pn{font-size:13px;font-weight:600;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ps{font-family:'Syne Mono',monospace;font-size:9px;color:var(--dim);margin-top:2px;display:block}
.tag{font-family:'Syne Mono',monospace;font-size:8px;letter-spacing:1px;text-transform:uppercase;padding:3px 7px;border-radius:2px;border:1px solid;flex-shrink:0}
.tag.perm{color:var(--red);border-color:var(--red);background:rgba(200,57,43,.06)}
.tag.tmp{color:var(--gold);border-color:var(--gold);background:rgba(184,134,11,.06)}
.tag.role{color:var(--dim);border-color:var(--brd2);background:var(--p2)}
.tag.pres{color:var(--green);border-color:var(--green);background:rgba(45,106,79,.06)}
.tag.deg{color:var(--gold);border-color:var(--gold);background:rgba(184,134,11,.06)}
.pdel{background:none;border:1px solid var(--brd2);color:var(--dim);font-family:'Syne Mono',monospace;font-size:9px;cursor:pointer;padding:5px 10px;border-radius:2px;flex-shrink:0;touch-action:manipulation;letter-spacing:.5px}
.pdel:active{border-color:var(--red);color:var(--red);background:rgba(200,57,43,.06)}
.pact{display:flex;gap:5px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end}

/* ── PROGRESS ── */
.prow{display:flex;align-items:center;gap:10px;padding:12px 14px}
.ptrk{flex:1;height:3px;background:var(--brd);border-radius:2px;overflow:hidden}
.pfil{height:100%;background:var(--ink);border-radius:2px;transition:width .4s}
.pfil.full{background:var(--red)}
.pnum{font-family:'Syne Mono',monospace;font-size:11px;color:var(--dim);white-space:nowrap}

/* ── INLINE FORM ── */
.form{border:1px solid var(--brd);border-radius:3px;padding:12px 14px;margin-bottom:10px;background:var(--p2)}
.flbl{font-family:'Syne Mono',monospace;font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--dim);margin-bottom:8px;display:block}
.frow{display:flex;gap:6px;margin-bottom:6px;flex-wrap:wrap}
.frow:last-child{margin-bottom:0}
.fhint{font-family:'Syne Mono',monospace;font-size:9px;color:var(--dim2);margin-top:5px}
.fi{flex:1;min-width:120px;background:var(--paper);border:1px solid var(--brd2);color:var(--ink);font-family:'Syne',sans-serif;font-size:13px;padding:8px 10px;border-radius:2px;outline:none;-webkit-appearance:none}
.fi:focus{border-color:var(--ink)}
.fi::placeholder{color:var(--dim2)}
.fi.sm{min-width:70px;max-width:80px;flex:none}

/* ── EMPTY ── */
.empty{padding:40px 14px;text-align:center;font-family:'Syne Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--dim2);text-transform:uppercase}

/* ── PRES BANNER ── */
.ptban{border:1px solid var(--gold);border-radius:3px;padding:12px 14px;margin-bottom:10px;background:rgba(184,134,11,.04);display:flex;align-items:flex-start;gap:12px;flex-wrap:wrap}
.ptlbl{font-family:'Syne Mono',monospace;font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:2px}
.ptname{font-size:15px;font-weight:700}
.ptsub{font-family:'Syne Mono',monospace;font-size:9px;color:var(--dim);margin-top:2px}

/* ── NOTES ── */
.npb{margin-bottom:14px}
.npn{font-family:'Syne Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--dim);padding-bottom:6px;border-bottom:1px solid var(--brd);display:block}
.ne2{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid var(--brd)}
.ne2:last-child{border-bottom:none}
.ndot{width:4px;height:4px;border-radius:50%;background:var(--dim2);flex-shrink:0;margin-top:7px}
.ntxt{font-size:12px;flex:1;line-height:1.5}
.ntime{font-family:'Syne Mono',monospace;font-size:9px;color:var(--dim2);flex-shrink:0;margin-top:2px}
.ndel{background:none;border:1px solid var(--brd2);color:var(--dim);cursor:pointer;font-size:9px;font-family:'Syne Mono',monospace;padding:3px 8px;border-radius:2px;flex-shrink:0;touch-action:manipulation}
.ndel:active{border-color:var(--red);color:var(--red)}

/* ── DEG CHIP ── */
.dc{width:22px;height:22px;border-radius:50%;border:1px solid var(--brd2);display:flex;align-items:center;justify-content:center;font-family:'Syne Mono',monospace;font-size:9px;font-weight:700;color:var(--dim);flex-shrink:0;background:var(--p2)}
.dc.g{border-color:var(--green);color:var(--green);background:rgba(45,106,79,.08)}
.dc.o{border-color:var(--gold);color:var(--gold);background:rgba(184,134,11,.08)}

/* ── LOGIN WALL ── */
#lwall{position:fixed;inset:0;background:rgba(0,0,0,.65);display:none;align-items:center;justify-content:center;z-index:999;padding:20px}
#lwall.show{display:flex}
#lbox{background:var(--paper);border:1px solid var(--brd2);width:100%;max-width:300px;border-top:3px solid var(--red)}
.lbtop{padding:14px 18px 10px;border-bottom:1px solid var(--brd)}
.lbtit{font-size:14px;font-weight:700}
.lbsub{font-family:'Syne Mono',monospace;font-size:9px;color:var(--dim);margin-top:2px;letter-spacing:1px}
.lbbody{padding:14px 18px}
#lpass{width:100%;background:var(--p2);border:1px solid var(--brd2);color:var(--ink);font-family:'Syne Mono',monospace;font-size:16px;padding:10px 12px;outline:none;border-radius:2px;display:block;margin-bottom:8px;letter-spacing:2px;-webkit-appearance:none}
#lpass:focus{border-color:var(--ink)}
#lerr{font-family:'Syne Mono',monospace;font-size:9px;color:var(--red);min-height:14px;margin-bottom:8px}
.lbbtns{display:flex;gap:6px}

/* ── TOAST ── */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--paper);font-family:'Syne Mono',monospace;font-size:10px;letter-spacing:1px;padding:10px 18px;border-radius:3px;z-index:9999;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap;max-width:calc(100vw - 40px);text-align:center}
#toast.show{opacity:1}
#toast.err{background:var(--red)}

/* ── SYNC INDICATOR ── */
#sync{width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0;opacity:0;transition:opacity .3s}
#sync.pulse{opacity:1;animation:syncpulse .6s ease-out forwards}
@keyframes syncpulse{0%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(2)}}

/* ── MOBILE ── */
@media(max-width:640px){
  #mob-menu{display:block}
  #left{position:fixed;top:var(--top);left:0;bottom:0;z-index:150;transform:translateX(-100%)}
  #left.mob-open{transform:translateX(0)}
  #sb-overlay.show{display:block}
  .tsep{display:none}
  #clk{display:none}
  .brand{font-size:11px}
  #mbody{padding:12px 14px}
  #mhd{padding:12px 14px 10px}
  .ptit{font-size:16px}
  .frow{flex-direction:column}
  .fi.sm{max-width:100%;min-width:0;width:100%}
  .pact{width:100%;margin-top:6px}
  .pr{flex-wrap:wrap}
  .pi{width:calc(100% - 42px)}
}
</style>
</head>
<body>
<div id="top">
  <button id="mob-menu">☰</button>
  <span class="brand">KM</span>
  <div class="tsep"></div>
  <span id="clk"></span>
  <div class="tsp"></div>
  <div id="sync"></div>
  <button class="pill" id="p-in">Ieiet</button>
  <button class="pill" id="p-ok">Admin ✓</button>
  <button class="pill" id="p-out">Iziet</button>
</div>

<div id="sb-overlay"></div>

<div id="shell">
  <div id="left">
    <div id="sb">
      <div class="shd">Melnais saraksts <button class="sadd" id="bl-add">+ Tips</button></div>
      <div class="sb-form" id="bl-form">
        <input type="text" id="bl-inp" placeholder="Tipa nosaukums">
        <div class="sb-form-btns">
          <button class="sb-cancel" id="bl-cancel">Atcelt</button>
          <button class="sb-ok" id="bl-ok">Pievienot</button>
        </div>
      </div>
      <div id="bl-nav"></div>

      <div class="sdiv"></div>

      <div class="shd">Darbi <button class="sadd" id="job-add">+ Darbs</button></div>
      <div class="sb-form" id="job-form">
        <input type="text" id="job-inp" placeholder="Darba nosaukums">
        <input type="number" id="job-max" placeholder="Maks. vietas" min="1">
        <div class="sb-form-btns">
          <button class="sb-cancel" id="job-cancel">Atcelt</button>
          <button class="sb-ok" id="job-ok">Pievienot</button>
        </div>
      </div>
      <div id="job-nav"></div>

      <div class="sdiv"></div>

      <div class="shd">Sistēma</div>
      <div id="sys-nav"></div>
    </div>
  </div>

  <div id="main">
    <div id="mhd">
      <div class="psub" id="hsub"></div>
      <div class="ptit" id="htit">KM Sistēma</div>
    </div>
    <div id="mbody">
      <div class="land"><div class="land-big">KM</div><div class="land-sm">Izvēlies sadaļu</div></div>
    </div>
  </div>
</div>

<div id="lwall">
  <div id="lbox">
    <div class="lbtop"><div class="lbtit">Administratora pieeja</div><div class="lbsub">PAROLE</div></div>
    <div class="lbbody">
      <input type="password" id="lpass" placeholder="••••••••" autocomplete="off">
      <div id="lerr"></div>
      <div class="lbbtns">
        <button class="btn" id="lcancel">Atcelt</button>
        <button class="btn p" id="lok">Ieiet →</button>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
var PASS='KMAdmin3', SK='km_v6';

// ═══ TOAST ═════════════════════════════════════════════════
var _te=document.getElementById('toast'),_tt;
function toast(msg,err){
  _te.textContent=msg;
  _te.className=err?'err':'';
  void _te.offsetWidth;
  _te.classList.add('show');
  clearTimeout(_tt);
  _tt=setTimeout(function(){_te.classList.remove('show')},2400);
}

// ═══ SYNC PULSE ════════════════════════════════════════════
var _se=document.getElementById('sync');
function syncPulse(){
  _se.className='';void _se.offsetWidth;
  _se.className='pulse';
}

// ═══ STORE ═════════════════════════════════════════════════
function blank(){return{blacklists:{},jobs:{},ministers:[],presChain:[],presTemp:null,notes:[]}}
function loadD(){try{var r=localStorage.getItem(SK);if(r)return Object.assign(blank(),JSON.parse(r))}catch(e){}return blank()}
var D=loadD(),CBS=[],BC;

// BroadcastChannel for real-time cross-tab/window sync
try{
  BC=new BroadcastChannel(SK);
  BC.onmessage=function(e){
    if(e.data&&e.data.t==='u'){
      D=e.data.d;
      syncPulse();
      CBS.forEach(function(f){f()});
    }
  };
}catch(e){}

function save(){
  localStorage.setItem(SK,JSON.stringify(D));
  try{BC.postMessage({t:'u',d:D})}catch(e){}
  syncPulse();
  CBS.forEach(function(f){f()});
}
function onChange(f){CBS.push(f)}

// BL
function blAddType(n){if(D.blacklists[n])return false;D.blacklists[n]=[];save();return true}
function blDelType(n){delete D.blacklists[n];save()}
function blAdd(type,name,hrs){
  if(!D.blacklists[type])return'nt';
  if(minIs(name))return'min';
  var exp=hrs?new Date(Date.now()+hrs*3600000).toISOString():null;
  D.blacklists[type].push({name:name,exp:exp,at:new Date().toISOString()});
  save();return true;
}
function blDel(type,idx){D.blacklists[type].splice(idx,1);save()}
function blExp(e){return e.exp&&new Date(e.exp)<Date.now()}

// Jobs
function jobAdd(n,max){if(D.jobs[n])return false;D.jobs[n]={max:max,workers:[]};save();return true}
function jobDel(n){delete D.jobs[n];save()}
function wAdd(job,name){
  var j=D.jobs[job];if(!j)return'nj';
  if(j.workers.length>=j.max)return'full';
  if(j.workers.indexOf(name)>=0)return'dup';
  j.workers.push(name);save();return true;
}
function wDel(job,name){var j=D.jobs[job];if(!j)return;var i=j.workers.indexOf(name);if(i>=0){j.workers.splice(i,1);save()}}

// Ministers
function minIs(n){return D.ministers.some(function(m){return m.name.toLowerCase()===n.toLowerCase()})}
function minAdd(name,role){if(D.ministers.some(function(m){return m.name===name}))return false;D.ministers.push({name:name,role:role});save();return true}
function minDel(idx){D.ministers.splice(idx,1);save()}

// President chain — array of {name}, index = position (0=Prezidents, 1=Vice, 2+=pakapes)
function presLabel(i){if(i===0)return'Prezidents';if(i===1)return'Vice Prezidents';return(i-1)+'. Prezidenta pakāpe'}
function presAdd(name){
  if(D.presChain.some(function(p){return p.name===name}))return false;
  D.presChain.push({name:name});save();return true;
}
function presDel(idx){D.presChain.splice(idx,1);save()}
function presGetTmp(){return D.presTemp&&new Date(D.presTemp.until)>Date.now()?D.presTemp:null}
function presActivate(){
  if(presGetTmp())return{already:true};
  if(D.presChain.length<2)return null;
  var nx=D.presChain[1];
  D.presTemp={name:nx.name,pos:1,until:new Date(Date.now()+86400000).toISOString()};
  save();return D.presTemp;
}
function presCancel(){D.presTemp=null;save()}

// Notes
function noteAdd(p,t){D.notes.push({person:p,text:t,at:new Date().toISOString()});save()}
function noteDel(i){D.notes.splice(i,1);save()}

// ═══ STATE ═════════════════════════════════════════════════
var isAdmin=false,view=null;

// ═══ HELPERS ═══════════════════════════════════════════════
function g(id){return document.getElementById(id)}
function el(tag,cls,txt){var e=document.createElement(tag);if(cls)e.className=cls;if(txt!==undefined)e.textContent=txt;return e}
function av(name){var d=el('div','pav');d.textContent=(name||'?').slice(0,2).toUpperCase();return d}
function fmt(iso){if(!iso)return'';return new Date(iso).toLocaleString('lv-LV',{day:'2-digit',month:'2-digit',year:'2-digit',hour:'2-digit',minute:'2-digit'})}
function mkbtn(lbl,cls,fn){var b=el('button','btn '+(cls||''),lbl);b.onclick=fn;return b}
function mki(cls,ph,tp){var i=el('input','fi'+(cls?' '+cls:''));i.placeholder=ph||'';if(tp)i.type=tp;return i}

// Delete button — always visible, no confirm needed
function delBtn(label,fn){
  var b=el('button','pdel',label);
  b.onclick=function(e){e.stopPropagation();fn()};
  return b;
}

// Close sidebar on mobile after nav
function closeSidebar(){
  g('left').classList.remove('mob-open');
  g('sb-overlay').classList.remove('show');
}

// ═══ SIDEBAR ═══════════════════════════════════════════════
function buildNav(){
  // Blacklists
  var bln=g('bl-nav');bln.innerHTML='';
  var bks=Object.keys(D.blacklists);
  if(!bks.length)bln.appendChild(el('div','ne','Nav tipu'));
  bks.forEach(function(type){
    var active=(D.blacklists[type]||[]).filter(function(e){return!blExp(e)});
    var r=el('div','nr'+(view&&view.type==='bl'&&view.key===type?' on':''));
    r.appendChild(el('span','nn',type));
    if(active.length)r.appendChild(el('span','nb',''+active.length));
    if(isAdmin){
      var x=el('button','nx','✕');
      x.onclick=function(ev){ev.stopPropagation();blDelType(type);if(view&&view.key===type)view=null};
      r.appendChild(x);
    }
    r.onclick=function(){setView('bl',type);closeSidebar()};
    bln.appendChild(r);
  });

  // Jobs
  var jn=g('job-nav');jn.innerHTML='';
  var jks=Object.keys(D.jobs);
  if(!jks.length)jn.appendChild(el('div','ne','Nav darbu'));
  jks.forEach(function(name){
    var j=D.jobs[name],full=j.workers.length>=j.max;
    var r=el('div','nr'+(view&&view.type==='job'&&view.key===name?' on':''));
    r.appendChild(el('span','nn',name));
    r.appendChild(el('span','nb'+(full?' r':''),j.workers.length+'/'+j.max));
    if(isAdmin){
      var x=el('button','nx','✕');
      x.onclick=function(ev){ev.stopPropagation();jobDel(name);if(view&&view.key===name)view=null};
      r.appendChild(x);
    }
    r.onclick=function(){setView('job',name);closeSidebar()};
    jn.appendChild(r);
  });

  // System
  var sn=g('sys-nav');sn.innerHTML='';
  [{l:'Ministri',t:'ministers'},{l:'Prezidents',t:'president'},{l:'Piezīmes',t:'notes',a:true}].forEach(function(s){
    if(s.a&&!isAdmin)return;
    var r=el('div','nr'+(view&&view.type===s.t?' on':''));
    r.appendChild(el('span','nn',s.l));
    r.onclick=function(){setView(s.t,null);closeSidebar()};
    sn.appendChild(r);
  });

  document.querySelectorAll('.sadd').forEach(function(b){b.style.display=isAdmin?'inline-block':'none'});
}

// Sidebar inline forms
g('bl-add').onclick=function(){var f=g('bl-form');f.classList.toggle('open');if(f.classList.contains('open'))setTimeout(function(){g('bl-inp').focus()},50)};
g('bl-cancel').onclick=function(){g('bl-form').classList.remove('open');g('bl-inp').value=''};
g('bl-ok').onclick=function(){
  var v=g('bl-inp').value.trim();if(!v)return;
  if(!blAddType(v)){toast('Jau eksistē!',true);return}
  g('bl-form').classList.remove('open');g('bl-inp').value='';
  toast('Tips pievienots');
};
g('bl-inp').addEventListener('keydown',function(e){if(e.key==='Enter')g('bl-ok').onclick();if(e.key==='Escape')g('bl-cancel').onclick()});

g('job-add').onclick=function(){var f=g('job-form');f.classList.toggle('open');if(f.classList.contains('open'))setTimeout(function(){g('job-inp').focus()},50)};
g('job-cancel').onclick=function(){g('job-form').classList.remove('open');g('job-inp').value='';g('job-max').value=''};
g('job-ok').onclick=function(){
  var n=g('job-inp').value.trim(),m=parseInt(g('job-max').value);
  if(!n||isNaN(m)||m<1){toast('Aizpildi abus laukus',true);return}
  if(!jobAdd(n,m)){toast('Jau eksistē!',true);return}
  g('job-form').classList.remove('open');g('job-inp').value='';g('job-max').value='';
  toast('Darbs izveidots');
};
g('job-inp').addEventListener('keydown',function(e){if(e.key==='Escape')g('job-cancel').onclick()});
g('job-max').addEventListener('keydown',function(e){if(e.key==='Enter')g('job-ok').onclick();if(e.key==='Escape')g('job-cancel').onclick()});

// ═══ VIEWS ═════════════════════════════════════════════════
function setView(type,key){view={type:type,key:key};buildNav();render()}
function setHdr(sub,title){g('hsub').textContent=sub;g('htit').textContent=title}

function render(){
  var body=g('mbody');body.innerHTML='';
  if(!view){
    body.innerHTML='<div class="land"><div class="land-big">KM</div><div class="land-sm">Izvēlies sadaļu</div></div>';
    return;
  }
  var t=view.type,k=view.key;

  // ── BLACKLIST ──────────────────────────────────────────
  if(t==='bl'){
    setHdr('Melnais saraksts',k);
    var all=D.blacklists[k]||[];
    var active=all.filter(function(e){return!blExp(e)});

    if(isAdmin){
      var f=el('div','form');
      f.appendChild(el('span','flbl','Pievienot personu'));
      var row=el('div','frow');
      var ni=mki('','Vārds Uzvārds');
      var hi=mki('sm','Stundas','number');hi.min='0';hi.step='0.5';
      var ab=mkbtn('Pievienot','p',function(){
        var n=ni.value.trim(),h=parseFloat(hi.value)||null;
        if(!n){toast('Ievadi vārdu',true);return}
        var r=blAdd(k,n,h);
        if(r==='min'){toast(n+' ir ministrs!',true);return}
        ni.value='';hi.value='';
        toast(n+' pievienots');
      });
      row.appendChild(ni);row.appendChild(hi);row.appendChild(ab);
      f.appendChild(row);
      f.appendChild(el('div','fhint','Stundas tukšs = pastāvīgi'));
      body.appendChild(f);
    }

    if(!active.length){body.appendChild(el('div','empty','Nav aktīvo ierakstu'));return}

    var card=el('div','card');
    var hd=el('div','chd');
    hd.appendChild(el('span','cht','Personas'));
    hd.appendChild(el('span','chm',active.length+' aktīvie'));
    card.appendChild(hd);
    var bd=el('div');
    active.forEach(function(entry){
      var realIdx=all.indexOf(entry);
      var row2=el('div','pr');
      row2.appendChild(av(entry.name));
      var info=el('div','pi');
      info.appendChild(el('span','pn',entry.name));
      info.appendChild(el('span','ps',entry.exp?'Līdz: '+fmt(entry.exp):'Pievienots: '+fmt(entry.at)));
      row2.appendChild(info);
      row2.appendChild(el('span','tag '+(entry.exp?'tmp':'perm'),entry.exp?'Pagaidu':'Pastāvīgi'));
      if(isAdmin){
        var db=delBtn('Noņemt',function(){blDel(k,realIdx);toast('Noņemts')});
        row2.appendChild(db);
      }
      bd.appendChild(row2);
    });
    card.appendChild(bd);body.appendChild(card);
  }

  // ── JOB ───────────────────────────────────────────────
  else if(t==='job'){
    var j=D.jobs[k];if(!j)return;
    setHdr('Darbs',k);
    var pct=j.max>0?j.workers.length/j.max:0,full=j.workers.length>=j.max;
    var pc=el('div','card');
    var ph=el('div','chd');ph.appendChild(el('span','cht','Vietas'));
    var pr=el('div','prow');
    var pt=el('div','ptrk');
    var pf=el('div','pfil'+(full?' full':''));
    pf.style.width=Math.round(pct*100)+'%';
    pt.appendChild(pf);pr.appendChild(pt);
    pr.appendChild(el('span','pnum',j.workers.length+' / '+j.max));
    pc.appendChild(ph);pc.appendChild(pr);body.appendChild(pc);

    if(isAdmin){
      var jf=el('div','form');
      jf.appendChild(el('span','flbl',full?'Darbs ir pilns':'Pievienot darbinieku'));
      if(!full){
        var jr=el('div','frow');
        var wi=mki('','Vārds Uzvārds');
        jr.appendChild(wi);
        jr.appendChild(mkbtn('Pievienot','p',function(){
          var n=wi.value.trim();if(!n){toast('Ievadi vārdu',true);return}
          var r=wAdd(k,n);
          if(r==='full'){toast('Darbs ir pilns!',true);return}
          if(r==='dup'){toast(n+' jau pievienots',true);return}
          wi.value='';toast(n+' pievienots');
        }));
        jf.appendChild(jr);
      }
      body.appendChild(jf);
    }

    if(!j.workers.length){body.appendChild(el('div','empty','Nav darbinieku'));return}
    var wc=el('div','card');
    var whd=el('div','chd');whd.appendChild(el('span','cht','Darbinieki'));
    var wbd=el('div');
    j.workers.slice().forEach(function(w){
      var row3=el('div','pr');
      row3.appendChild(av(w));
      var info2=el('div','pi');info2.appendChild(el('span','pn',w));
      row3.appendChild(info2);
      if(isAdmin){
        var db2=delBtn('Noņemt',function(){wDel(k,w);toast(w+' noņemts')});
        row3.appendChild(db2);
      }
      wbd.appendChild(row3);
    });
    wc.appendChild(whd);wc.appendChild(wbd);body.appendChild(wc);
  }

  // ── MINISTERS ─────────────────────────────────────────
  else if(t==='ministers'){
    setHdr('Sistēma','Ministri');
    if(isAdmin){
      var mf=el('div','form');
      mf.appendChild(el('span','flbl','Pievienot ministru'));
      var mr=el('div','frow');
      var mni=mki('','Vārds Uzvārds');
      var mri=mki('','Amats / Loma');
      mr.appendChild(mni);mr.appendChild(mri);
      mr.appendChild(mkbtn('Pievienot','p',function(){
        var n=mni.value.trim(),r=mri.value.trim();
        if(!n||!r){toast('Aizpildi abus laukus',true);return}
        if(!minAdd(n,r)){toast('Jau eksistē',true);return}
        mni.value='';mri.value='';toast(n+' pievienots');
      }));
      mf.appendChild(mr);body.appendChild(mf);
    }
    if(!D.ministers.length){body.appendChild(el('div','empty','Nav ministru'));return}
    var mc=el('div','card');
    var mhd=el('div','chd');
    mhd.appendChild(el('span','cht','Ministri'));
    mhd.appendChild(el('span','chm',''+D.ministers.length));
    var mbd=el('div');
    D.ministers.forEach(function(m,i){
      var row4=el('div','pr');
      row4.appendChild(av(m.name));
      var info3=el('div','pi');
      info3.appendChild(el('span','pn',m.name));
      info3.appendChild(el('span','ps',m.role));
      row4.appendChild(info3);
      row4.appendChild(el('span','tag role',m.role));
      if(isAdmin){
        var db3=delBtn('Noņemt',function(){minDel(i);toast(m.name+' noņemts')});
        row4.appendChild(db3);
      }
      mbd.appendChild(row4);
    });
    mc.appendChild(mhd);mc.appendChild(mbd);body.appendChild(mc);
  }

  // ── PRESIDENT ─────────────────────────────────────────
  else if(t==='president'){
    setHdr('Sistēma','Prezidents');
    var tmp=presGetTmp();

    // Pagaidu banner
    if(tmp){
      var ban=el('div','ptban');
      var bi=el('div');bi.style.flex='1';
      bi.appendChild(el('div','ptlbl','Pagaidu Prezidents'));
      bi.appendChild(el('div','ptname',tmp.name));
      bi.appendChild(el('div','ptsub',presLabel(tmp.pos)+'  ·  Līdz: '+fmt(tmp.until)));
      ban.appendChild(bi);
      if(isAdmin){
        ban.appendChild(mkbtn('Atcelt','d',function(){presCancel();toast('Atcelts')}));
      }
      body.appendChild(ban);
    }

    // Chain list — who is president, vice, etc.
    if(D.presChain.length){
      var cc=el('div','card');
      var ch=el('div','chd');
      ch.appendChild(el('span','cht','Hierarhija'));
      ch.appendChild(el('span','chm',D.presChain.length+' personas'));
      var cb=el('div');
      D.presChain.forEach(function(p,i){
        var row5=el('div','pr');
        var chip=el('div','dc'+(i===0?' g':i===1?' o':''),i===0?'P':i===1?'V':''+(i-1));
        row5.appendChild(chip);
        var info4=el('div','pi');
        info4.appendChild(el('span','pn',p.name));
        info4.appendChild(el('span','ps',presLabel(i)));
        row5.appendChild(info4);
        var tagCls=i===0?'pres':i===1?'deg':'role';
        row5.appendChild(el('span','tag '+tagCls,presLabel(i)));
        if(isAdmin){
          var db4=delBtn('Noņemt',function(){presDel(i);toast(p.name+' noņemts')});
          row5.appendChild(db4);
        }
        cb.appendChild(row5);
      });
      cc.appendChild(ch);cc.appendChild(cb);body.appendChild(cc);
    }

    // Admin: add to chain
    if(isAdmin){
      var pf1=el('div','form');
      var nextPos=D.presChain.length;
      var nextLbl=presLabel(nextPos);
      pf1.appendChild(el('span','flbl','Pievienot nākamo'));
      pf1.appendChild(el('div','fhint','Nākamā pozīcija: '+nextLbl));
      var pr1=el('div','frow');pr1.style.marginTop='8px';
      var pni=mki('','Vārds Uzvārds');
      pr1.appendChild(pni);
      pr1.appendChild(mkbtn('Pievienot','p',function(){
        var n=pni.value.trim();if(!n){toast('Ievadi vārdu',true);return}
        if(!presAdd(n)){toast('Jau sarakstā',true);return}
        pni.value='';toast(n+' pievienots kā '+presLabel(D.presChain.length-1));
      }));
      pf1.appendChild(pr1);body.appendChild(pf1);

      // Presidenta-nav
      var pf2=el('div','form');
      pf2.appendChild(el('span','flbl','Presidenta-nav'));
      if(D.presChain.length>1){
        pf2.appendChild(el('div','fhint','Aktivizēs: '+D.presChain[1].name+' ('+presLabel(1)+') uz 24h'));
      }else{
        pf2.appendChild(el('div','fhint','Vajag vismaz Prezidentu un Vice Prezidentu.'));
      }
      var pr2=el('div','frow');pr2.style.marginTop='8px';
      pr2.appendChild(mkbtn(tmp?'Jau aktīvs':'Aktivizēt uz 24h',tmp?'':'g',function(){
        if(tmp){toast('Jau aktīvs: '+tmp.name,true);return}
        var res=presActivate();
        if(!res){toast('Vajag vismaz 2 personas!',true);return}
        if(res.already){toast('Jau aktīvs',true);return}
        toast(res.name+' ir pagaidu prezidents');
      }));
      pf2.appendChild(pr2);body.appendChild(pf2);
    }
  }

  // ── NOTES ─────────────────────────────────────────────
  else if(t==='notes'){
    setHdr('Sistēma','Piezīmes');
    if(isAdmin){
      var nf=el('div','form');
      nf.appendChild(el('span','flbl','Pievienot piezīmi'));
      var nr=el('div','frow');
      var npi=mki('','Vārds Uzvārds');
      var nti=mki('','Teksts');
      nr.appendChild(npi);nr.appendChild(nti);
      nr.appendChild(mkbtn('Pievienot','p',function(){
        var p=npi.value.trim(),tx=nti.value.trim();
        if(!p||!tx){toast('Aizpildi abus laukus',true);return}
        noteAdd(p,tx);npi.value='';nti.value='';toast('Piezīme pievienota');
      }));
      nf.appendChild(nr);body.appendChild(nf);
    }
    var ng={};
    D.notes.forEach(function(n,i){if(!ng[n.person])ng[n.person]=[];ng[n.person].push({n:n,i:i})});
    var ppl=Object.keys(ng);
    if(!ppl.length){body.appendChild(el('div','empty','Nav piezīmju'));return}
    ppl.forEach(function(person){
      var blk=el('div','npb');
      blk.appendChild(el('span','npn',person));
      ng[person].forEach(function(e){
        var row6=el('div','ne2');
        row6.appendChild(el('div','ndot'));
        row6.appendChild(el('span','ntxt',e.n.text));
        row6.appendChild(el('span','ntime',fmt(e.n.at)));
        if(isAdmin){
          var nd=el('button','ndel','✕');
          nd.onclick=function(){noteDel(e.i);toast('Dzēsts')};
          row6.appendChild(nd);
        }
        blk.appendChild(row6);
      });
      body.appendChild(blk);
    });
  }
}

// ═══ AUTH ══════════════════════════════════════════════════
g('p-in').onclick=function(){g('lwall').classList.add('show');setTimeout(function(){g('lpass').focus()},100)};
g('lcancel').onclick=function(){g('lwall').classList.remove('show');g('lpass').value='';g('lerr').textContent=''};
g('lok').onclick=doLogin;
g('lpass').addEventListener('keydown',function(e){if(e.key==='Enter')doLogin()});
g('p-out').onclick=function(){
  isAdmin=false;
  g('p-in').style.display='';g('p-ok').style.display='none';g('p-out').style.display='none';
  if(view&&view.type==='notes')view=null;
  buildNav();render();
  toast('Izlogojies');
};
function doLogin(){
  if(g('lpass').value===PASS){
    isAdmin=true;
    g('lwall').classList.remove('show');g('lpass').value='';g('lerr').textContent='';
    g('p-in').style.display='none';g('p-ok').style.display='';g('p-out').style.display='';
    buildNav();render();
    toast('Ielogojies kā admin');
  }else{
    g('lerr').textContent='Nepareiza parole.';
    g('lpass').value='';g('lpass').focus();
  }
}

// ═══ MOBILE MENU ═══════════════════════════════════════════
g('mob-menu').onclick=function(){
  var open=g('left').classList.toggle('mob-open');
  g('sb-overlay').classList.toggle('show',open);
};
g('sb-overlay').onclick=closeSidebar;

// ═══ BOOT ══════════════════════════════════════════════════
onChange(function(){buildNav();render()});
setInterval(function(){g('clk').textContent=new Date().toLocaleTimeString('lv-LV')},1000);
g('clk').textContent=new Date().toLocaleTimeString('lv-LV');
buildNav();
</script>
