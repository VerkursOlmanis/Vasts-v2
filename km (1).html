<!DOCTYPE html>
<html lang="lv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KM</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Syne+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --ink:#0a0a0a;--paper:#f5f2ed;--paper2:#ede9e2;--paper3:#e4dfd6;
  --accent:#c8392b;--gold:#b8860b;--green:#2d6a4f;
  --dim:#8a8278;--dim2:#c4bdb4;--border:#d4cfc8;--border2:#bfb9b0;
  --sans:'Syne',sans-serif;--mono:'Syne Mono',monospace;
}
html,body{height:100%;overflow:hidden;background:var(--paper);color:var(--ink);font-family:var(--sans);font-size:13px}
#shell{display:grid;grid-template-columns:250px 1fr;grid-template-rows:46px 1fr;height:100vh}
#top{grid-column:1/-1;background:var(--ink);display:flex;align-items:center;padding:0 18px;gap:14px;border-bottom:2px solid var(--accent)}
.brand{font-family:var(--mono);font-size:12px;color:var(--paper);letter-spacing:4px}
.tsep{width:1px;height:18px;background:#2a2a2a}
#clk{font-family:var(--mono);font-size:10px;color:#555}
.tsp{flex:1}
.pill{font-family:var(--mono);font-size:9px;letter-spacing:2px;text-transform:uppercase;padding:4px 10px;border:1px solid;background:none;cursor:pointer;transition:all .15s}
#p-in{border-color:#2a2a2a;color:#555}
#p-in:hover{border-color:var(--accent);color:var(--accent)}
#p-ok{border-color:var(--green);color:#4caf82;display:none}
#p-out{border-color:#3a1a1a;color:var(--accent);display:none}
#p-out:hover{background:var(--accent);color:var(--paper)}
#left{background:var(--paper2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
#sb{flex:1;overflow-y:auto;padding:8px 0}
#sb::-webkit-scrollbar{width:0}
.shd{font-family:var(--mono);font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--dim);padding:12px 14px 4px;display:flex;align-items:center}
.sadd{margin-left:auto;background:none;border:none;color:var(--dim2);font-size:15px;cursor:pointer;line-height:1;display:none;padding:0 3px;transition:color .1s}
.sadd:hover{color:var(--ink)}
.sdiv{height:1px;background:var(--border);margin:6px 14px}
.nr{display:flex;align-items:center;padding:6px 14px 6px 20px;gap:7px;cursor:pointer;border-left:2px solid transparent;transition:background .1s}
.nr:hover{background:var(--paper3)}
.nr.on{background:var(--paper3);border-left-color:var(--accent)}
.nr.on .nn{color:var(--ink);font-weight:600}
.nn{font-size:12px;color:var(--dim);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.nr:hover .nn{color:var(--ink)}
.nb{font-family:var(--mono);font-size:9px;color:var(--dim);background:var(--paper3);border:1px solid var(--border);padding:1px 6px;border-radius:20px}
.nb.r{color:var(--accent);border-color:var(--accent);background:rgba(200,57,43,.06)}
.nx{background:none;border:none;color:var(--dim2);font-size:10px;cursor:pointer;padding:1px 3px;font-family:var(--mono)}
.nr:hover .nx{opacity:1}
.nx:hover{color:var(--accent)}
.ne{padding:3px 20px;font-family:var(--mono);font-size:9px;color:var(--dim2)}
#main{display:flex;flex-direction:column;overflow:hidden}
#mhd{padding:18px 24px 14px;border-bottom:1px solid var(--border);flex-shrink:0;display:flex;align-items:flex-end;gap:12px}
.psub{font-family:var(--mono);font-size:9px;color:var(--dim);letter-spacing:1px;margin-bottom:3px}
.ptit{font-size:20px;font-weight:800;letter-spacing:-.5px;line-height:1}
#mbody{flex:1;overflow-y:auto;padding:20px 24px}
#mbody::-webkit-scrollbar{width:3px}
#mbody::-webkit-scrollbar-thumb{background:var(--border2)}
.land{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:4px}
.land-big{font-size:100px;font-weight:800;color:var(--paper3);line-height:1;letter-spacing:-6px;user-select:none}
.land-sm{font-family:var(--mono);font-size:9px;letter-spacing:3px;color:var(--dim2);text-transform:uppercase}
.btn{font-family:var(--mono);font-size:9px;letter-spacing:1.5px;text-transform:uppercase;padding:6px 12px;border-radius:2px;border:1px solid var(--border2);background:transparent;color:var(--dim);cursor:pointer;transition:all .15s;white-space:nowrap}
.btn:hover{border-color:var(--ink);color:var(--ink)}
.btn.p{border-color:var(--ink);color:var(--ink)}
.btn.p:hover{background:var(--ink);color:var(--paper)}
.btn.d{border-color:var(--accent);color:var(--accent)}
.btn.d:hover{background:var(--accent);color:var(--paper)}
.btn.g{border-color:var(--gold);color:var(--gold)}
.btn.g:hover{background:var(--gold);color:var(--paper)}
.card{border:1px solid var(--border);border-radius:3px;margin-bottom:8px;overflow:hidden;background:var(--paper)}
.chd{padding:9px 14px;background:var(--paper2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.cht{font-size:10px;font-weight:700;letter-spacing:.5px;flex:1}
.chm{font-family:var(--mono);font-size:9px;color:var(--dim)}
.pr{display:flex;align-items:center;padding:9px 14px;gap:10px;border-bottom:1px solid var(--border);transition:background .1s}
.pr:last-child{border-bottom:none}
.pr:hover{background:var(--paper2)}
.pav{width:28px;height:28px;border-radius:50%;background:var(--paper3);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:9px;font-weight:700;color:var(--dim);flex-shrink:0;text-transform:uppercase}
.pi{flex:1;min-width:0}
.pn{font-size:12px;font-weight:600;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ps{font-family:var(--mono);font-size:9px;color:var(--dim);margin-top:1px;display:block}
.tag{font-family:var(--mono);font-size:8px;letter-spacing:1px;text-transform:uppercase;padding:2px 7px;border-radius:2px;border:1px solid;flex-shrink:0}
.tag.perm{color:var(--accent);border-color:var(--accent);background:rgba(200,57,43,.06)}
.tag.tmp{color:var(--gold);border-color:var(--gold);background:rgba(184,134,11,.06)}
.tag.role{color:var(--dim);border-color:var(--border2);background:var(--paper2)}
.tag.pres{color:var(--green);border-color:var(--green);background:rgba(45,106,79,.06)}
.tag.deg{color:var(--gold);border-color:var(--gold);background:rgba(184,134,11,.06)}
.pdel{background:none;border:1px solid var(--border2);color:var(--dim);font-family:var(--mono);font-size:9px;cursor:pointer;padding:3px 7px;border-radius:2px;transition:all .15s;flex-shrink:0}

.pdel:hover{border-color:var(--accent);color:var(--accent);background:rgba(200,57,43,.06)}
.pact{display:flex;gap:4px;flex-shrink:0}

.prow{display:flex;align-items:center;gap:10px;padding:11px 14px}
.ptrk{flex:1;height:2px;background:var(--border);border-radius:1px;overflow:hidden}
.pfil{height:100%;background:var(--ink);border-radius:1px;transition:width .4s}
.pfil.full{background:var(--accent)}
.pnum{font-family:var(--mono);font-size:10px;color:var(--dim);white-space:nowrap}
.form{border:1px solid var(--border);border-radius:3px;padding:12px 14px;margin-bottom:10px;background:var(--paper2)}
.flbl{font-family:var(--mono);font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--dim);margin-bottom:8px;display:block}
.frow{display:flex;gap:5px;margin-bottom:6px}
.frow:last-child{margin-bottom:0}
.fhint{font-family:var(--mono);font-size:9px;color:var(--dim2);margin-top:5px}
.fi{flex:1;background:var(--paper);border:1px solid var(--border2);color:var(--ink);font-family:var(--sans);font-size:12px;padding:6px 9px;border-radius:2px;outline:none;min-width:0;transition:border-color .1s}
.fi:focus{border-color:var(--ink)}
.fi::placeholder{color:var(--dim2)}
.fi.sm{max-width:75px;flex:none}
.empty{padding:32px 14px;text-align:center;font-family:var(--mono);font-size:9px;letter-spacing:2px;color:var(--dim2);text-transform:uppercase}
.ptban{border:1px solid var(--gold);border-radius:3px;padding:12px 14px;margin-bottom:10px;background:rgba(184,134,11,.04);display:flex;align-items:center;gap:12px}
.ptlbl{font-family:var(--mono);font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:2px}
.ptname{font-size:14px;font-weight:700}
.ptsub{font-family:var(--mono);font-size:9px;color:var(--dim);margin-top:2px}
.npb{margin-bottom:14px}
.npn{font-family:var(--mono);font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--dim);padding-bottom:5px;border-bottom:1px solid var(--border);display:block;margin-bottom:0}
.ne2{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.ne2:last-child{border-bottom:none}
.ndot{width:3px;height:3px;border-radius:50%;background:var(--dim2);flex-shrink:0;margin-top:8px}
.ntxt{font-size:12px;flex:1;line-height:1.5}
.ntime{font-family:var(--mono);font-size:9px;color:var(--dim2);flex-shrink:0;margin-top:2px}
.ndel{background:none;border:none;color:var(--dim2);cursor:pointer;font-size:10px;transition:all .15s}
.ne2:hover .ndel{opacity:1}
.ndel:hover{color:var(--accent)}
.dc{width:20px;height:20px;border-radius:50%;border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:8px;font-weight:700;color:var(--dim);flex-shrink:0;background:var(--paper2)}
.dc.g{border-color:var(--green);color:var(--green);background:rgba(45,106,79,.08)}
.dc.o{border-color:var(--gold);color:var(--gold);background:rgba(184,134,11,.08)}
#lwall{position:fixed;inset:0;background:rgba(0,0,0,.65);display:none;align-items:center;justify-content:center;z-index:999;backdrop-filter:blur(3px)}
#lwall.show{display:flex}
#lbox{background:var(--paper);border:1px solid var(--border2);width:270px;border-top:3px solid var(--accent)}
.lbtop{padding:14px 18px 10px;border-bottom:1px solid var(--border)}
.lbtit{font-size:13px;font-weight:700}
.lbsub{font-family:var(--mono);font-size:9px;color:var(--dim);margin-top:2px;letter-spacing:1px}
.lbbody{padding:14px 18px}
#lpass{width:100%;background:var(--paper2);border:1px solid var(--border2);color:var(--ink);font-family:var(--mono);font-size:13px;padding:8px 10px;outline:none;border-radius:2px;display:block;margin-bottom:7px;letter-spacing:2px;transition:border-color .1s}
#lpass:focus{border-color:var(--ink)}
#lerr{font-family:var(--mono);font-size:9px;color:var(--accent);min-height:13px;margin-bottom:7px}
.lbbtns{display:flex;gap:5px}

.toast{position:fixed;bottom:20px;right:20px;background:var(--ink);color:var(--paper);font-family:var(--mono);font-size:10px;letter-spacing:1px;padding:10px 16px;border-radius:3px;z-index:9999;opacity:0;transition:opacity .2s;pointer-events:none}
.toast.show{opacity:1}
.toast.err{background:var(--accent)}
</style>
</head>
<body>
<div id="shell">
  <div id="top">
    <span class="brand">KM</span>
    <div class="tsep"></div>
    <span id="clk"></span>
    <div class="tsp"></div>
    <button class="pill" id="p-in">Ieiet</button>
    <button class="pill" id="p-ok">Admin ✓</button>
    <button class="pill" id="p-out">Iziet</button>
  </div>
  <div id="left">
    <div id="sb">
      <div class="shd">Melnais saraksts <button class="sadd" id="bl-add">+</button></div>
      <div id="bl-nav"></div>
      <div class="sdiv"></div>
      <div class="shd">Darbi <button class="sadd" id="job-add">+</button></div>
      <div id="job-nav"></div>
      <div class="sdiv"></div>
      <div class="shd">Sistēma</div>
      <div id="sys-nav"></div>
    </div>
  </div>
  <div id="main">
    <div id="mhd">
      <div>
        <div class="psub" id="hsub"></div>
        <div class="ptit" id="htit">KM Sistēma</div>
      </div>
    </div>
    <div id="mbody">
      <div class="land"><div class="land-big">KM</div><div class="land-sm">Izvēlies sadaļu</div></div>
    </div>
  </div>
</div>
<div id="lwall">
  <div id="lbox">
    <div class="lbtop"><div class="lbtit">Administratora pieeja</div><div class="lbsub">PAROLE OBLIGĀTA</div></div>
    <div class="lbbody">
      <input type="password" id="lpass" placeholder="••••••••" autocomplete="off">
      <div id="lerr"></div>
      <div class="lbbtns">
        <button class="btn" id="lcancel">Atcelt</button>
        <button class="btn p" id="lok">Ieiet →</button>
      </div>
    </div>
  </div>
</div>
<script>

// Toast notification — replaces alert/confirm
var _toast=null;
function toast(msg,isErr){
  if(!_toast){_toast=document.createElement('div');_toast.className='toast';document.body.appendChild(_toast)}
  _toast.textContent=msg;_toast.className='toast'+(isErr?' err':'');
  void _toast.offsetWidth;
  _toast.classList.add('show');
  clearTimeout(_toast._t);
  _toast._t=setTimeout(function(){_toast.classList.remove('show')},2200);
}

// ═══ STORE ═══════════════════════════════════════════════════════
var SK='km_v5', PASS='KMAdmin3';
function blank(){return{blacklists:{},jobs:{},ministers:[],presChain:[],presTemp:null,notes:[]}}
function loadD(){try{var r=localStorage.getItem(SK);if(r)return Object.assign(blank(),JSON.parse(r))}catch(e){}return blank()}
var D=loadD(), CBS=[], BC;
try{BC=new BroadcastChannel('km_v5');BC.onmessage=function(e){if(e.data&&e.data.t==='s'){D=e.data.d;CBS.forEach(function(f){f()})}}}catch(e){}
function save(){localStorage.setItem(SK,JSON.stringify(D));try{BC.postMessage({t:'s',d:D})}catch(e){};CBS.forEach(function(f){f()})}
function onChange(f){CBS.push(f)}

// BL
function blAddType(n){if(D.blacklists[n])return false;D.blacklists[n]=[];save();return true}
function blDelType(n){delete D.blacklists[n];save()}
function blAdd(type,name,hrs){
  if(!D.blacklists[type])return'nt';
  if(minIs(name))return'min';
  var exp=hrs?new Date(Date.now()+hrs*3600000).toISOString():null;
  D.blacklists[type].push({name:name,exp:exp,at:new Date().toISOString()});save();return true}
function blDel(type,idx){D.blacklists[type].splice(idx,1);save()}
function blExp(e){return e.exp&&new Date(e.exp)<Date.now()}

// Jobs
function jobAdd(n,max){if(D.jobs[n])return false;D.jobs[n]={max:max,workers:[]};save();return true}
function jobDel(n){delete D.jobs[n];save()}
function wAdd(job,name){
  var j=D.jobs[job];if(!j)return'nj';
  if(j.workers.length>=j.max)return'full';
  if(j.workers.indexOf(name)>=0)return'dup';
  j.workers.push(name);save();return true}
function wDel(job,name){var j=D.jobs[job];if(!j)return;var i=j.workers.indexOf(name);if(i>=0){j.workers.splice(i,1);save()}}

// Ministers
function minIs(name){return D.ministers.some(function(m){return m.name.toLowerCase()===name.toLowerCase()})}
function minAdd(name,role){if(D.ministers.some(function(m){return m.name===name}))return false;D.ministers.push({name:name,role:role,deg:null});save();return true}
function minDel(idx){D.ministers.splice(idx,1);save()}
function minSetDeg(idx,deg){D.ministers.forEach(function(m,j){if(j!==idx&&m.deg===deg)m.deg=null});D.ministers[idx].deg=deg;save()}
function minClearDeg(idx){D.ministers[idx].deg=null;save()}

// President chain — [{name}], index 0=Prezidents, 1=Vice, 2+=pakāpes
function presAdd(name){
  if(!D.presChain)D.presChain=[];
  if(D.presChain.some(function(p){return p.name===name}))return false;
  D.presChain.push({name:name});save();return true}
function presDel(idx){if(!D.presChain)return;D.presChain.splice(idx,1);save()}
function presGetTmp(){return D.presTemp&&new Date(D.presTemp.until)>Date.now()?D.presTemp:null}
function presActivate(){
  if(!D.presChain)D.presChain=[];
  if(presGetTmp())return{already:true};
  // find next after index 0 (president)
  if(D.presChain.length<2)return null;
  var nx=D.presChain[1];
  D.presTemp={name:nx.name,pos:1,until:new Date(Date.now()+86400000).toISOString()};
  save();return D.presTemp}
function presCancel(){D.presTemp=null;save()}
function presLabel(idx){if(idx===0)return'Prezidents';if(idx===1)return'Vice Prezidents';return(idx-1)+'. Prezidenta pakāpe'}

// Notes
function noteAdd(p,t){D.notes.push({person:p,text:t,at:new Date().toISOString()});save()}
function noteDel(i){D.notes.splice(i,1);save()}

// ═══ UI STATE ════════════════════════════════════════════════════
var isAdmin=false, view=null;

// ═══ HELPERS ═════════════════════════════════════════════════════
function g(id){return document.getElementById(id)}
function el(tag,cls,txt){var e=document.createElement(tag);if(cls)e.className=cls;if(txt!==undefined)e.textContent=txt;return e}
function av(name){var d=el('div','pav');d.textContent=(name||'?').slice(0,2).toUpperCase();return d}
function fmt(iso){if(!iso)return'';return new Date(iso).toLocaleString('lv-LV',{day:'2-digit',month:'2-digit',year:'2-digit',hour:'2-digit',minute:'2-digit'})}
function mkbtn(lbl,cls,fn){var b=el('button','btn '+(cls||''),lbl);b.onclick=fn;return b}
function mkinput(cls,ph,type){var i=el('input','fi'+(cls?' '+cls:''));i.placeholder=ph||'';if(type)i.type=type;return i}
function pdel(lbl,fn){var b=el('button','pdel',lbl);b.onclick=fn;return b}

// ═══ SIDEBAR ═════════════════════════════════════════════════════
function buildNav(){
  // Blacklists
  var bln=g('bl-nav');bln.innerHTML='';
  var bks=Object.keys(D.blacklists);
  if(!bks.length)bln.appendChild(el('div','ne','Nav tipu'));
  bks.forEach(function(type){
    var active=(D.blacklists[type]||[]).filter(function(e){return!blExp(e)});
    var r=el('div','nr'+(view&&view.type==='bl'&&view.key===type?' on':''));
    r.appendChild(el('span','nn',type));
    if(active.length)r.appendChild(el('span','nb',''+active.length));
    if(isAdmin){var x=el('button','nx','✕');(function(t){x.onclick=function(e){e.stopPropagation();blDelType(t);if(view&&view.key===t)view=null}})(type);r.appendChild(x)}
    (function(t){r.onclick=function(){setView('bl',t)}})(type);
    bln.appendChild(r);
  });

  // Jobs
  var jn=g('job-nav');jn.innerHTML='';
  var jks=Object.keys(D.jobs);
  if(!jks.length)jn.appendChild(el('div','ne','Nav darbu'));
  jks.forEach(function(name){
    var j=D.jobs[name],full=j.workers.length>=j.max;
    var r=el('div','nr'+(view&&view.type==='job'&&view.key===name?' on':''));
    r.appendChild(el('span','nn',name));
    r.appendChild(el('span','nb'+(full?' r':''),j.workers.length+'/'+j.max));
    if(isAdmin){var x=el('button','nx','✕');(function(n){x.onclick=function(e){e.stopPropagation();jobDel(n);if(view&&view.key===n)view=null}})(name);r.appendChild(x)}
    (function(n){r.onclick=function(){setView('job',n)}})(name);
    jn.appendChild(r);
  });

  // System
  var sn=g('sys-nav');sn.innerHTML='';
  [{label:'Ministri',type:'ministers'},{label:'Prezidents',type:'president'},{label:'Piezīmes',type:'notes',adm:true}].forEach(function(s){
    if(s.adm&&!isAdmin)return;
    var r=el('div','nr'+(view&&view.type===s.type?' on':''));
    r.appendChild(el('span','nn',s.label));
    (function(t){r.onclick=function(){setView(t,null)}})(s.type);
    sn.appendChild(r);
  });

  document.querySelectorAll('.sadd').forEach(function(b){b.style.display=isAdmin?'block':'none'});
}

// ═══ VIEWS ═══════════════════════════════════════════════════════
function setView(type,key){view={type:type,key:key};buildNav();render()}
function setHdr(sub,title){g('hsub').textContent=sub;g('htit').textContent=title}

function render(){
  var body=g('mbody');body.innerHTML='';
  if(!view){body.innerHTML='<div class="land"><div class="land-big">KM</div><div class="land-sm">Izvēlies sadaļu</div></div>';return}
  var t=view.type,k=view.key;

  // ── BLACKLIST ────────────────────────────────────────────────
  if(t==='bl'){
    setHdr('Melnais saraksts',k);
    var all=D.blacklists[k]||[];
    var active=all.filter(function(e){return!blExp(e)});

    if(isAdmin){
      var f=el('div','form');
      f.appendChild(el('span','flbl','Pievienot personu'));
      var row=el('div','frow');
      var ni=mkinput('','Vārds Uzvārds');
      var hi=mkinput('sm','Stundas','number');hi.min='0';hi.step='0.5';
      var ab=mkbtn('Pievienot','p',function(){
        var n=ni.value.trim(),h=parseFloat(hi.value)||null;
        if(!n)return;
        var r=blAdd(k,n,h);
        if(r==='min'){toast(n+' ir ministrs!',true);return}
        ni.value='';hi.value='';
      });
      row.appendChild(ni);row.appendChild(hi);row.appendChild(ab);
      f.appendChild(row);
      f.appendChild(el('div','fhint','Stundas tukšs = pastāvīgi'));
      body.appendChild(f);
    }

    if(!active.length){body.appendChild(el('div','empty','Nav aktīvo ierakstu'));return}
    var card=el('div','card');
    var hd=el('div','chd');hd.appendChild(el('span','cht','Personas'));hd.appendChild(el('span','chm',active.length+' aktīvie'));
    card.appendChild(hd);
    var bd=el('div');
    active.forEach(function(entry){
      var ri=all.indexOf(entry);
      var row=el('div','pr');
      row.appendChild(av(entry.name));
      var info=el('div','pi');
      info.appendChild(el('span','pn',entry.name));
      info.appendChild(el('span','ps',entry.exp?'Līdz: '+fmt(entry.exp):'Pievienots: '+fmt(entry.at)));
      row.appendChild(info);
      row.appendChild(el('span','tag '+(entry.exp?'tmp':'perm'),entry.exp?'Pagaidu':'Pastāvīgi'));
      if(isAdmin){(function(idx){row.appendChild(pdel('Noņemt',function(){blDel(k,idx)}))})(ri)}
      bd.appendChild(row);
    });
    card.appendChild(bd);body.appendChild(card);
  }

  // ── JOB ─────────────────────────────────────────────────────
  else if(t==='job'){
    var j=D.jobs[k];if(!j)return;
    setHdr('Darbs',k);
    var pct=j.max>0?j.workers.length/j.max:0,full=j.workers.length>=j.max;
    var pc=el('div','card');
    var ph=el('div','chd');ph.appendChild(el('span','cht','Vietas'));
    var pr=el('div','prow');
    var pt=el('div','ptrk');var pf=el('div','pfil'+(full?' full':''));
    pf.style.width=Math.round(pct*100)+'%';pt.appendChild(pf);pr.appendChild(pt);
    pr.appendChild(el('span','pnum',j.workers.length+' / '+j.max));
    pc.appendChild(ph);pc.appendChild(pr);body.appendChild(pc);

    if(isAdmin){
      var jf=el('div','form');
      jf.appendChild(el('span','flbl',full?'Darbs ir pilns':'Pievienot darbinieku'));
      if(!full){
        var jr=el('div','frow');
        var wi=mkinput('','Vārds Uzvārds');
        jr.appendChild(wi);
        jr.appendChild(mkbtn('Pievienot','p',function(){
          var n=wi.value.trim();if(!n)return;
          var r=wAdd(k,n);
          if(r==='full'){toast('Darbs ir pilns!',true);return}
          if(r==='dup'){toast('Jau pievienots!',true);return}
          wi.value='';
        }));
        jf.appendChild(jr);
      }
      body.appendChild(jf);
    }

    if(!j.workers.length){body.appendChild(el('div','empty','Nav darbinieku'));return}
    var wc=el('div','card');
    var whd=el('div','chd');whd.appendChild(el('span','cht','Darbinieki'));
    var wbd=el('div');
    j.workers.slice().forEach(function(w){
      var row=el('div','pr');row.appendChild(av(w));
      var info=el('div','pi');info.appendChild(el('span','pn',w));row.appendChild(info);
      if(isAdmin){(function(wn){row.appendChild(pdel('Noņemt',function(){wDel(k,wn)}))})(w)}
      wbd.appendChild(row);
    });
    wc.appendChild(whd);wc.appendChild(wbd);body.appendChild(wc);
  }

  // ── MINISTERS ───────────────────────────────────────────────
  else if(t==='ministers'){
    setHdr('Sistēma','Ministri');
    if(isAdmin){
      var mf=el('div','form');
      mf.appendChild(el('span','flbl','Pievienot ministru'));
      var mr=el('div','frow');
      var mni=mkinput('','Vārds Uzvārds'),mri=mkinput('','Amats / Loma');
      mr.appendChild(mni);mr.appendChild(mri);
      mr.appendChild(mkbtn('Pievienot','p',function(){
        var n=mni.value.trim(),r=mri.value.trim();if(!n||!r)return;
        if(!minAdd(n,r)){toast('Jau eksistē!',true);return}
        mni.value='';mri.value='';
      }));
      mf.appendChild(mr);body.appendChild(mf);
    }
    if(!D.ministers.length){body.appendChild(el('div','empty','Nav ministru'));return}
    var mc=el('div','card');
    var mhd=el('div','chd');mhd.appendChild(el('span','cht','Ministri'));mhd.appendChild(el('span','chm',''+D.ministers.length));
    var mbd=el('div');
    D.ministers.forEach(function(m,i){
      var row=el('div','pr');row.appendChild(av(m.name));
      var info=el('div','pi');
      info.appendChild(el('span','pn',m.name));
      info.appendChild(el('span','ps',m.role));
      row.appendChild(info);
      if(m.deg!=null)row.appendChild(el('span','tag deg',m.deg+'. pakāpe'));
      if(isAdmin){
        var acts=el('div','pact');
        var degb=mkbtn(m.deg!=null?'Mainīt pakāpi':'+ Pakāpe','',function(){});
        (function(idx){degb.onclick=function(){
          var inp=prompt('Prezidenta pakāpe ministram "'+D.ministers[idx].name+'" (tukšs = noņemt):');
          if(inp===null)return;inp=inp.trim();
          if(inp===''){minClearDeg(idx);return}
          var d=parseInt(inp);if(isNaN(d)||d<1){toast('Ievadi skaitli ≥ 1.',true);return}
          minSetDeg(idx,d);
        }})(i);
        acts.appendChild(degb);
        (function(idx){acts.appendChild(pdel('Noņemt',function(){minDel(idx)}))})(i);
        row.appendChild(acts);
      }
      mbd.appendChild(row);
    });
    mc.appendChild(mhd);mc.appendChild(mbd);body.appendChild(mc);
  }

  // ── PRESIDENT ───────────────────────────────────────────────
  else if(t==='president'){
    setHdr('Sistēma','Prezidents');
    if(!D.presChain)D.presChain=[];
    var tmp=presGetTmp();

    // Pagaidu banner
    if(tmp){
      var ban=el('div','ptban');
      var bi=el('div');bi.style.flex='1';
      bi.appendChild(el('div','ptlbl','Pagaidu Prezidents'));
      bi.appendChild(el('div','ptname',tmp.name));
      bi.appendChild(el('div','ptsub',presLabel(tmp.pos)+'  ·  Līdz: '+fmt(tmp.until)));
      ban.appendChild(bi);
      if(isAdmin)ban.appendChild(mkbtn('Atcelt','d',function(){presCancel()}));
      body.appendChild(ban);
    }

    // Add form (admin)
    if(isAdmin){
      var af=el('div','form');
      af.appendChild(el('span','flbl','Pievienot'));
      var ar=el('div','frow');
      var ani=mkinput('','Vārds Uzvārds');
      ar.appendChild(ani);
      ar.appendChild(mkbtn('Pievienot','p',function(){
        var n=ani.value.trim();if(!n)return;
        if(!presAdd(n)){toast('Jau sarakstā!',true);return}
        ani.value='';
      }));
      af.appendChild(ar);
      // hint shows what slot will be filled
      var slotHint=el('div','fhint','Nākamā pozīcija: '+presLabel(D.presChain.length));
      af.appendChild(slotHint);
      body.appendChild(af);
    }

    // Chain list
    if(!D.presChain.length){body.appendChild(el('div','empty','Nav pievienots neviens'));return}

    var cc=el('div','card');
    var ch=el('div','chd');ch.appendChild(el('span','cht','Hierarhija'));ch.appendChild(el('span','chm',D.presChain.length+' personas'));
    var cb=el('div');
    D.presChain.forEach(function(p,i){
      var row=el('div','pr');
      // chip
      var chip=el('div','dc'+(i===0?' g':i===1?' o':''),''+( i===0?'P':i===1?'VP':i));
      row.appendChild(chip);
      var info=el('div','pi');
      info.appendChild(el('span','pn',p.name));
      info.appendChild(el('span','ps',presLabel(i)));
      row.appendChild(info);
      var tagCls=i===0?'pres':i===1?'deg':'role';
      row.appendChild(el('span','tag '+tagCls,presLabel(i)));
      if(isAdmin){(function(idx){row.appendChild(pdel('Noņemt',function(){presDel(idx)}))})(i)}
      cb.appendChild(row);
    });
    cc.appendChild(ch);cc.appendChild(cb);body.appendChild(cc);

    // Activate pagaidu
    if(isAdmin){
      var pf2=el('div','form');
      pf2.appendChild(el('span','flbl','Presidenta-nav — pagaidu prezidents uz 24h'));
      if(D.presChain.length>1){pf2.appendChild(el('div','fhint','Aktivizēs: '+D.presChain[1].name+' ('+presLabel(1)+')'))}
      else{pf2.appendChild(el('div','fhint','Vajag vismaz 2 personas hierarhijā.'))}
      var pr2=el('div','frow');pr2.style.marginTop='8px';
      pr2.appendChild(mkbtn(tmp?'Jau aktīvs':'Aktivizēt',tmp?'':'g',function(){
        if(tmp){toast('Jau aktīvs: '+tmp.name,true);return}
        var res=presActivate();
        if(!res){toast('Vajag vismaz 2 personas!',true);return}
        if(res.already){toast('Jau aktīvs.',true);return}
      }));
      pf2.appendChild(pr2);body.appendChild(pf2);
    }
  }

  // ── NOTES ───────────────────────────────────────────────────
  else if(t==='notes'){
    setHdr('Sistēma','Piezīmes');
    if(isAdmin){
      var nf=el('div','form');
      nf.appendChild(el('span','flbl','Pievienot piezīmi'));
      var nr=el('div','frow');
      var npi=mkinput('','Vārds Uzvārds'),nti=mkinput('','Teksts');
      nr.appendChild(npi);nr.appendChild(nti);
      nr.appendChild(mkbtn('Pievienot','p',function(){
        var p=npi.value.trim(),tx=nti.value.trim();if(!p||!tx)return;
        noteAdd(p,tx);npi.value='';nti.value='';
      }));
      nf.appendChild(nr);body.appendChild(nf);
    }
    var ng={};
    D.notes.forEach(function(n,i){if(!ng[n.person])ng[n.person]=[];ng[n.person].push({n:n,i:i})});
    var ppl=Object.keys(ng);
    if(!ppl.length){body.appendChild(el('div','empty','Nav piezīmju'));return}
    ppl.forEach(function(person){
      var blk=el('div','npb');blk.appendChild(el('span','npn',person));
      ng[person].forEach(function(e){
        var row=el('div','ne2');
        row.appendChild(el('div','ndot'));
        row.appendChild(el('span','ntxt',e.n.text));
        row.appendChild(el('span','ntime',fmt(e.n.at)));
        if(isAdmin){var nd=el('button','ndel','✕');(function(idx){nd.onclick=function(){noteDel(idx)}})(e.i);row.appendChild(nd)}
        blk.appendChild(row);
      });
      body.appendChild(blk);
    });
  }
}

// ═══ SIDEBAR ADD BUTTONS ═════════════════════════════════════════
// These use inline mini-forms instead of prompt() so they actually work
(function(){
  var blBtn=g('bl-add');
  var blForm=null;
  blBtn.onclick=function(){
    if(blForm){blForm.remove();blForm=null;return}
    blForm=el('div');blForm.style.cssText='background:var(--paper);border:1px solid var(--border);border-top:none;padding:8px 10px;';
    var inp=el('input','fi');inp.style.cssText='width:100%;margin-bottom:6px;font-size:11px;padding:5px 8px;';inp.placeholder='Tipa nosaukums';
    var ab=el('button','btn p','+');ab.style.cssText='width:100%;font-size:9px;padding:5px;';
    ab.onclick=function(){var v=inp.value.trim();if(!v)return;if(!blAddType(v)){toast('Jau eksistē!',true)}blForm.remove();blForm=null};
    inp.addEventListener('keydown',function(e){if(e.key==='Enter')ab.onclick();if(e.key==='Escape'){blForm.remove();blForm=null}});
    blForm.appendChild(inp);blForm.appendChild(ab);
    g('bl-nav').parentNode.insertBefore(blForm,g('bl-nav'));
    setTimeout(function(){inp.focus()},50);
  };
})();

(function(){
  var jBtn=g('job-add');
  var jForm=null;
  jBtn.onclick=function(){
    if(jForm){jForm.remove();jForm=null;return}
    jForm=el('div');jForm.style.cssText='background:var(--paper);border:1px solid var(--border);border-top:none;padding:8px 10px;';
    var ni=el('input','fi');ni.style.cssText='width:100%;margin-bottom:5px;font-size:11px;padding:5px 8px;';ni.placeholder='Darba nosaukums';
    var mi=el('input','fi');mi.style.cssText='width:100%;margin-bottom:6px;font-size:11px;padding:5px 8px;';mi.placeholder='Maks. vietas';mi.type='number';mi.min='1';
    var ab=el('button','btn p','+');ab.style.cssText='width:100%;font-size:9px;padding:5px;';
    ab.onclick=function(){
      var n=ni.value.trim(),m=parseInt(mi.value);
      if(!n||isNaN(m)||m<1)return;
      if(!jobAdd(n,m)){toast('Jau eksistē!',true)}
      jForm.remove();jForm=null;
    };
    ni.addEventListener('keydown',function(e){if(e.key==='Escape'){jForm.remove();jForm=null}});
    jForm.appendChild(ni);jForm.appendChild(mi);jForm.appendChild(ab);
    g('job-nav').parentNode.insertBefore(jForm,g('job-nav'));
    setTimeout(function(){ni.focus()},50);
  };
})();

// ═══ AUTH ════════════════════════════════════════════════════════
g('p-in').onclick=function(){g('lwall').classList.add('show');setTimeout(function(){g('lpass').focus()},50)};
g('lcancel').onclick=function(){g('lwall').classList.remove('show');g('lpass').value='';g('lerr').textContent=''};
g('lok').onclick=doLogin;
g('lpass').addEventListener('keydown',function(e){if(e.key==='Enter')doLogin()});
g('p-out').onclick=function(){
  isAdmin=false;g('p-in').style.display='';g('p-ok').style.display='none';g('p-out').style.display='none';
  if(view&&view.type==='notes')view=null;
  buildNav();render();
};
function doLogin(){
  if(g('lpass').value===PASS){
    isAdmin=true;g('lwall').classList.remove('show');g('lpass').value='';g('lerr').textContent='';
    g('p-in').style.display='none';g('p-ok').style.display='';g('p-out').style.display='';
    buildNav();render();
  }else{g('lerr').textContent='Nepareiza parole.';g('lpass').value='';g('lpass').focus()}
}

// ═══ BOOT ════════════════════════════════════════════════════════
onChange(function(){buildNav();render()});
setInterval(function(){g('clk').textContent=new Date().toLocaleTimeString('lv-LV')},1000);
g('clk').textContent=new Date().toLocaleTimeString('lv-LV');
buildNav();
</script>
